---
meta:
  environment: nodejs
  toolchain:
    name: npm
    version: 20
build:
  skip: false           
  additionalCommands:
    - npm run build
  artifacts:
    '*': /
run:
  persistenceMount: /data
  scriptName: null
  scriptArguments: null
  nodeArguments: null
  command: npx next start -p 3000 -H 0.0.0.0
  containerPort: 3000
  servicePort: 80
